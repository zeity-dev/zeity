# pnpm-workspace.yaml
packages:
  # all packages in sub dirs of packages/ and apps/
  - "libs/**"
  - "apps/**"

ignoreWorkspaceRootCheck: true

trustPolicyExclude:
  - chokidar@4.0.3
  - rollup@2.80.0
  - semver@6.3.1
  - xlsx@0.20.3

overrides:
  "h3": "1.15.11"
  "h3-next": "npm:h3@2.0.1-rc.22"
  "zod": "^4.4.3"
  "@netlify/functions": "-"
  "@netlify/blobs": "-"

shamefullyHoist: true
reporter: append-only

allowBuilds:
  better-sqlite3: true
  sharp: true
  "@parcel/watcher": false
  esbuild: false
  unrs-resolver: false
  vue-demi: false

minimumReleaseAgeExclude:
  - '@nuxtjs/seo@5.3.3'
  - nuxt-schema-org@6.2.7
  - nuxtseo-shared@5.3.3
