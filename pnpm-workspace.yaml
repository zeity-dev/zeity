# pnpm-workspace.yaml
packages:
  # all packages in sub dirs of packages/ and apps/
  - "libs/**"
  - "apps/**"

ignoreWorkspaceRootCheck: true

trustPolicyExclude:
  - chokidar@4.0.3
  - rollup@2.80.0
  - semver@6.3.1
  - xlsx@0.20.3

overrides:
  "zod": "^4.4.3"
  "vite": "npm:rolldown-vite@latest"
  "@netlify/functions": "-"
  "@netlify/blobs": "-"

shamefullyHoist: true
reporter: append-only

allowBuilds:
  better-sqlite3: true
  sharp: true
  "@parcel/watcher": false
  esbuild: false
  unrs-resolver: false
  vue-demi: false
